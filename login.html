<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    body {
      background: linear-gradient(to right, #74ebd5, #ACB6E5);
      font-family: Arial, sans-serif;
    }
    .container {
      max-width: 400px;
      margin: 80px auto;
      padding: 30px;
      background: #ebf5fb;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    input[type="submit"] {
      width: 100%;
      background-color: green;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    input[type="submit"]:hover {
      background-color: darkgreen;
    }
    .error, .success {
      text-align: center;
      padding: 10px;
      margin-top: 15px;
      border-radius: 5px;
      display: none;
    }
    .error {
      background-color: #f8d7da;
      color: #721c24;
    }
    .success {
      background-color: #d4edda;
      color: #155724;
    }
    .link {
      text-align: center;
      margin-top: 15px;
    }
    .link a {
      color: blue;
      text-decoration: none;
      font-weight: bold;
    }
    .link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Login</h1>
    <form id="loginForm">
      <label for="email">Email:</label>
      <input type="email" id="email" placeholder="Enter your registered email" required>

      <label for="password">Password:</label>
      <input type="password" id="password" placeholder="Enter your password" required>

      <input type="submit" value="Login">

      <div class="error" id="errorMsg">❌ Invalid Email or Password</div>
      <div class="success" id="successMsg">✅ Login Successful! Redirecting...</div>
    </form>

    <div class="link">
      <p>Don’t have an account? <a href="register.html">Register Here</a></p>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      const enteredEmail = document.getElementById('email').value;
      const enteredPassword = document.getElementById('password').value;

      const savedEmail = localStorage.getItem('userEmail');
      const savedPassword = localStorage.getItem('userPassword');

      if (enteredEmail === savedEmail && enteredPassword === savedPassword) {
        errorMsg.style.display = "none";
        successMsg.style.display = "block";

        // Redirect to home.html after 2 seconds
        setTimeout(() => {
          window.location.href = "home.html";
        }, 2000);
      } else {
        successMsg.style.display = "none";
        errorMsg.style.display = "block";
      }
    });
  </script>

</body>
</html>
